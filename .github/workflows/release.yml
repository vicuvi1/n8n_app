name: Release Windows launcher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && pip install -r launcher/requirements-build.txt

      - name: Generate icon if missing
        run: |
          if (-not (Test-Path assets/icon.ico)) { python launcher/generate_icon.py }

      - name: Build n8n Command Center.exe
        working-directory: launcher
        run: python -m PyInstaller --noconfirm --clean n8n_command_center.spec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/dist/n8n Command Center.exe
          generate_release_notes: true
