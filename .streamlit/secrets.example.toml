# Copy to secrets.toml and fill in your keys.
# secrets.toml is gitignored — never commit real credentials.
# Or use Automation Hub → API Configuration → Save n8n / Save all keys.

n8n_url = "http://localhost:5678"
n8n_api_key = "your_n8n_jwt_api_key_here"

[credentials_meta]
n8n_api_key_created = "2026-01-01T00:00:00Z"
n8n_api_key_expires = "2026-01-31T00:00:00Z"
n8n_api_key_note = "n8n JWT keys expire after 30 days"

# llm_provider = "Google Gemini"  # or "OpenAI" / "Groq"
# gemini_model = "gemini-2.5-flash"
# gemini_api_key = "AIza..."
# openai_api_key = "sk-..."
# groq_api_key = "gsk_..."
